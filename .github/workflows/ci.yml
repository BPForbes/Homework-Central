name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  # Newer pushes to the same PR/branch cancel in-flight CI for that ref so only
  # the latest commit is evaluated. Cancelled jobs can appear briefly with no
  # useful steps in the UI; check the newest successful run for Frontend/Backend.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # SonarQube PR decoration reads pull request metadata from the GitHub API.
  pull-requests: read

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16@sha256:4f6c1ec9743885ba6438a91f7c08c4ef4d645a41eae31fc8521c2d831c622107
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: homework_central_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d homework_central_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: Host=localhost;Port=5432;Database=homework_central_test;Username=postgres;Password=postgres

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup .NET 10.0.301
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore HomeworkCentral.sln

      - name: Build
        run: dotnet build HomeworkCentral.sln --configuration Release --no-restore

      - name: Reject unparameterized raw SQL
        run: |
          if rg -n 'FromSqlRaw\(|ExecuteSqlRaw\(|ExecuteSqlRawAsync\(|SqlQueryRaw\(' backend/HomeworkCentral.Api --type cs; then
            echo "Unparameterized raw SQL is not allowed. Use FromSqlInterpolated/ExecuteSqlInterpolated/SqlQuery."
            exit 1
          fi

      - name: Test
        run: dotnet test HomeworkCentral.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # Analyzes C# (Roslyn) and TypeScript/JavaScript (scanAll) with the same SonarQube
  # quality profile / gate. Activate by setting repository Variables + SONAR_TOKEN;
  # see docs/COMMENT_DOCUMENTATION_GUIDE.md#analyzer-and-ci-expectations.
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    if: ${{ vars.SONAR_PROJECT_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET 10.0.301
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarScanner for .NET
        run: dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Analyze C# and TypeScript
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        run: |
          set -euo pipefail
          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "SONAR_TOKEN secret is required when SONAR_PROJECT_KEY is set."
            exit 1
          fi

          BEGIN_ARGS=(
            "/k:${SONAR_PROJECT_KEY}"
            "/d:sonar.host.url=${SONAR_HOST_URL}"
            "/d:sonar.token=${SONAR_TOKEN}"
            "/d:sonar.scanner.scanAll=true"
            "/d:sonar.qualitygate.wait=true"
            "/d:sonar.exclusions=**/Migrations/**,**/node_modules/**,**/dist/**,**/.vite/**,**/bin/**,**/obj/**,**/.sonar/**"
            "/d:sonar.typescript.tsconfigPaths=frontend/tsconfig.json,frontend/tsconfig.app.json"
          )
          if [[ -n "${SONAR_ORGANIZATION}" ]]; then
            BEGIN_ARGS+=("/o:${SONAR_ORGANIZATION}")
          elif [[ "${SONAR_HOST_URL}" == *"sonarcloud"* ]] || [[ "${SONAR_HOST_URL}" == *"sonarqube.us"* ]]; then
            echo "SONAR_ORGANIZATION variable is required for SonarQube Cloud."
            exit 1
          fi

          ./.sonar/scanner/dotnet-sonarscanner begin "${BEGIN_ARGS[@]}"
          dotnet build HomeworkCentral.sln --configuration Release
          ./.sonar/scanner/dotnet-sonarscanner end "/d:sonar.token=${SONAR_TOKEN}"
