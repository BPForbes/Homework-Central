name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  # Newer pushes to the same PR/branch cancel in-flight CI for that ref so only
  # the latest commit is evaluated. Cancelled jobs can appear briefly with no
  # useful steps in the UI; check the newest successful run for Frontend/Backend.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16@sha256:4f6c1ec9743885ba6438a91f7c08c4ef4d645a41eae31fc8521c2d831c622107
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: homework_central_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d homework_central_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: Host=localhost;Port=5432;Database=homework_central_test;Username=postgres;Password=postgres

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup .NET 10.0.301
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore HomeworkCentral.sln

      - name: Build
        run: dotnet build HomeworkCentral.sln --configuration Release --no-restore

      - name: Reject unparameterized raw SQL
        run: |
          if rg -n 'FromSqlRaw\(|ExecuteSqlRaw\(|ExecuteSqlRawAsync\(|SqlQueryRaw\(' backend/HomeworkCentral.Api --type cs; then
            echo "Unparameterized raw SQL is not allowed. Use FromSqlInterpolated/ExecuteSqlInterpolated/SqlQuery."
            exit 1
          fi

      - name: Test
        run: dotnet test HomeworkCentral.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
