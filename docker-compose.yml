version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: homework_central
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
    # Omit host-port publish in production; uncomment only for local inspection.
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homework_central"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend/HomeworkCentral.Api
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >
        Host=postgres;Database=homework_central;Username=postgres;Password=${POSTGRES_PASSWORD}
      Jwt__Secret: "${JWT_SECRET:?JWT_SECRET must be set}"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      - backend

volumes:
  pgdata:
